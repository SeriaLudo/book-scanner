name: Deploy

on:
  push:
    branches: ['main']
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: 'production'
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false
      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path)" >> "$GITHUB_OUTPUT"
      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build client
        run: pnpm --filter @book-scanner/client build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}
      - name: Build server
        run: pnpm --filter @book-scanner/server build
      - name: Upload client artifact
        uses: actions/upload-artifact@v4
        with:
          name: client-dist
          path: ./client/dist

  deploy-client:
    name: Deploy client to Netlify
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download client artifact
        uses: actions/download-artifact@v4
        with:
          name: client-dist
          path: client/dist
      - name: Deploy to Netlify
        run: npx --yes netlify-cli@latest deploy --prod --dir=client/dist --site="$NETLIFY_SITE_ID" --auth="$NETLIFY_AUTH_TOKEN"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

  deploy-server:
    name: Deploy server to Azure VM
    runs-on: ubuntu-latest
    needs: build
    env:
      AZURE_VM_HOST: ${{ secrets.AZURE_VM_HOST }}
      AZURE_VM_PORT: ${{ secrets.AZURE_VM_PORT || '22' }}
      AZURE_VM_USER: ${{ secrets.AZURE_VM_USER }}
      AZURE_VM_SSH_KEY: ${{ secrets.AZURE_VM_SSH_KEY }}
      AZURE_APP_DIR: ${{ secrets.AZURE_APP_DIR || '/opt/book-scanner' }}
    steps:
      - name: Deploy over SSH
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p ~/.ssh
          printf '%s\n' "$AZURE_VM_SSH_KEY" > ~/.ssh/azure_vm_key
          chmod 600 ~/.ssh/azure_vm_key
          ssh-keyscan -p "$AZURE_VM_PORT" -H "$AZURE_VM_HOST" >> ~/.ssh/known_hosts

          ssh -i ~/.ssh/azure_vm_key -p "$AZURE_VM_PORT" "$AZURE_VM_USER@$AZURE_VM_HOST" "AZURE_APP_DIR='$AZURE_APP_DIR' bash -s" <<'REMOTE'
            set -euo pipefail

            cd "$AZURE_APP_DIR"
            git fetch origin main
            git checkout main
            git pull --ff-only origin main
            pnpm install --frozen-lockfile
            pnpm --filter @book-scanner/server build

            if [ -f server/.env ]; then
              set -a
              . server/.env
              set +a
            fi
            pnpm --filter @book-scanner/server db:migrate

            if command -v pm2 >/dev/null 2>&1; then
              pm2 restart book-scanner-api || pm2 start pnpm --name book-scanner-api -- --filter @book-scanner/server start
              pm2 save
            else
              sudo systemctl restart book-scanner-api
            fi
          REMOTE
