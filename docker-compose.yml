services:
  postgres:
    image: postgres:16
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-book_scanner}
      POSTGRES_USER: ${POSTGRES_USER:-book_scanner}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-book_scanner}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-book_scanner} -d ${POSTGRES_DB:-book_scanner}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
